databases:
  - name: secondo-zerlig-db
    databaseName: secondo_zerlig
    user: secondo_zerlig

services:
  - type: web
    name: secondo-zerlig-api
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ENABLE_DEBUG_TOOLS
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: DATABASE_URL
        fromDatabase:
          name: secondo-zerlig-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
